<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heart_canvas.js</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0B0E14; /* Tu color oscuro de fondo */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .code-container {
            position: absolute;
            bottom: 40px;
            z-index: 10;
            background-color: rgba(21, 27, 38, 0.85); /* Tu color #151B26 con opacidad */
            border: 1px solid #30363D;
            border-radius: 8px;
            padding: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }
        .window-header {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #30363D;
        }
        .code-text {
            color: #8B949E;
            font-size: 11px;
            line-height: 1.5;
        }
        .highlight-pink {
            color: #FF61EF; /* Tu rosa neón */
        }
        .highlight-green {
            color: #2EA043; /* Tu verde GitHub */
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="code-container">
        <div class="window-header">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="code-text">
            <span class="highlight-pink">const</span> target = <span class="highlight-green">"Papoi"</span>;<br>
            <span class="highlight-pink">function</span> initLove() {<br>
            &nbsp;&nbsp;<span class="highlight-pink">let</span> days = <span class="highlight-green">90</span>;<br>
            &nbsp;&nbsp;console.log(<span class="highlight-green">`Uptime: ${days} days`</span>);<br>
            &nbsp;&nbsp;<span class="highlight-pink">return</span> <span class="highlight-green">"Infinite"</span>;<br>
            }<br>
            initLove();
        </div>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Ecuación matemática del corazón
        function heartX(t) {
            return 16 * Math.pow(Math.sin(t), 3);
        }

        function heartY(t) {
            return -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
        }

        let particles = [];
        const numParticles = window.innerWidth < 600 ? 60 : 100; // Optimizado para celulares

        for (let i = 0; i < numParticles; i++) {
            particles.push({
                t: Math.random() * Math.PI * 2,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 0.02 + 0.005,
                opacity: Math.random() * 0.5 + 0.5
            });
        }

        function draw() {
            ctx.fillStyle = '#0B0E14';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const scale = window.innerWidth < 600 ? 10 : 15; // Más chico en celular
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2.3; // Ligeramente subido para dejar espacio a la caja

            particles.forEach(p => {
                p.t += p.speed;
                const x = heartX(p.t) * scale + centerX;
                const y = heartY(p.t) * scale + centerY;

                ctx.beginPath();
                ctx.arc(x, y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 97, 239, ${p.opacity})`; // Color rosa neón #FF61EF
                ctx.fill();
            });

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
